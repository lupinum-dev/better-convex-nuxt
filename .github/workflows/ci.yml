name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playground prepare
        run: npm run dev:prepare

      - name: Test
        run: npm run test

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Prepare
        run: npm run dev:prepare

      - name: Build module
        run: npm run prepack

      - name: Type check
        run: npm run test:types

      - name: Publish preview release
        run: npx pkg-pr-new publish --pnpm

  consumer-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fixture:
          - consumer-smoke
          - consumer-smoke-auth
          - consumer-smoke-own-convex

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Pack module
        id: pack
        run: |
          mkdir -p "$RUNNER_TEMP/pack"
          TARBALL="$(npm pack --silent --pack-destination "$RUNNER_TEMP/pack" | tail -n 1)"
          echo "tarball_path=$RUNNER_TEMP/pack/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Install fixture dependencies
        working-directory: test/fixtures/${{ matrix.fixture }}
        run: npx nypm@latest i

      - name: Install packed module in fixture
        working-directory: test/fixtures/${{ matrix.fixture }}
        run: npx nypm@latest add "${{ steps.pack.outputs.tarball_path }}"

      - name: Verify packed module resolves
        working-directory: test/fixtures/${{ matrix.fixture }}
        run: node -e "import('better-convex-nuxt').then(() => console.log('resolved')).catch((error) => { console.error(error); process.exit(1); })"

      - name: Consumer build
        working-directory: test/fixtures/${{ matrix.fixture }}
        run: npm run build

      - name: Consumer typecheck
        working-directory: test/fixtures/${{ matrix.fixture }}
        run: npm run typecheck

name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playground prepare
        run: npm run dev:prepare

      - name: Test
        run: npm run test

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Prepare
        run: npm run dev:prepare

      - name: Build module
        run: npm run prepack

      - name: Type check
        run: npm run test:types

      - name: Publish preview release
        run: npx pkg-pr-new publish --pnpm

  consumer-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Pack module
        id: pack
        run: |
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Install fixture dependencies
        working-directory: test/fixtures/consumer-smoke
        run: npx nypm@latest i

      - name: Install packed module in fixture
        working-directory: test/fixtures/consumer-smoke
        run: npx nypm@latest add "../../../${{ steps.pack.outputs.tarball }}"

      - name: Consumer build
        working-directory: test/fixtures/consumer-smoke
        run: npm run build

      - name: Consumer typecheck
        working-directory: test/fixtures/consumer-smoke
        run: npm run typecheck

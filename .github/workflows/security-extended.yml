name: security-extended

on:
  schedule:
    - cron: '41 2 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extended-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - run: pnpm test:e2e:full
      - run: pnpm test:dast:proxy

  nuxt-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        nuxt-version: ['4.4.0', 'latest']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Select Nuxt compatibility target
        run: pnpm update "nuxt@${{ matrix.nuxt-version }}" "@nuxt/kit@${{ matrix.nuxt-version }}" "@nuxt/schema@${{ matrix.nuxt-version }}" --lockfile=false
      - run: pnpm check

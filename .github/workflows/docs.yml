name: docs-links

# The docs app currently uses a maintainer-local Ginko tarball, so install and
# build validation is local until that dependency becomes reproducible in CI.
# This workflow retains the repository-only check that needs no docs install.
on:
  schedule:
    - cron: '43 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check external links in docs content
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --accept 100..=103,200..=299,403
            docs/content
          fail: true

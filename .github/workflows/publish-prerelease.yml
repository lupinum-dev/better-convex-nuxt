name: publish-prerelease

on:
  push:
    tags:
      - 'v*-*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BCN_STAGING_DIST_TAG: 'next-staging'
  RELEASE_NODE_VERSION: '22.14.0'
  RELEASE_NPM_VERSION: '11.5.1'

jobs:
  build-candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          package-manager-cache: false

      - name: Install pinned release tooling
        run: npm install --global npm@"$RELEASE_NPM_VERSION" corepack@0.34.5 && corepack enable

      - name: Verify protected prerelease identity
        env:
          BCN_SECURITY_DEPUTY: ${{ vars.BCN_SECURITY_DEPUTY }}
          BCN_SECURITY_NOTIFICATION_TESTED_AT: ${{ vars.BCN_SECURITY_NOTIFICATION_TESTED_AT }}
          BCN_SECURITY_OWNER: ${{ vars.BCN_SECURITY_OWNER }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: pnpm check:security-governance --prerelease

      - run: pnpm install --frozen-lockfile

      - name: Resolve the reviewed Vue/Nuxt candidate-set coordinates
        id: candidate_set
        run: node scripts/print-candidate-set-coordinates.mjs >> "$GITHUB_OUTPUT"

      - name: Build the immutable Vue/Nuxt candidate set once
        run: pnpm release:artifact:set

      - name: Upload the immutable Vue/Nuxt candidate set
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.candidate_set.outputs.artifact_name }}
          path: |
            ${{ steps.candidate_set.outputs.vue_directory }}/
            ${{ steps.candidate_set.outputs.nuxt_directory }}/
            ${{ steps.candidate_set.outputs.set_directory }}/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 90

      - name: Resolve the reviewed MCP artifact coordinates
        id: mcp
        run: node scripts/print-package-artifact-coordinates.mjs --package mcp >> "$GITHUB_OUTPUT"

      - name: Build the immutable MCP candidate once
        run: node scripts/release.mjs artifact --package mcp

      - name: Upload the immutable MCP candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.mcp.outputs.artifact_name }}
          path: ${{ steps.mcp.outputs.directory }}/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 90

  release-security:
    needs: build-candidates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan the release source for verified secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          base: ''
          head: HEAD
          version: 3.95.9
          extra_args: --only-verified

      - name: Initialize release CodeQL analysis
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript

      - name: Analyze the exact release source
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

  verify-candidates:
    needs: [build-candidates, release-security]
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          package-manager-cache: false

      - name: Install pinned verification tooling
        run: npm install --global npm@"$RELEASE_NPM_VERSION" corepack@0.34.5 && corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm check:auth-backend --install

      - name: Resolve the reviewed candidate coordinates
        id: candidate_set
        run: node scripts/print-candidate-set-coordinates.mjs >> "$GITHUB_OUTPUT"

      - name: Resolve the reviewed MCP coordinates
        id: mcp
        run: node scripts/print-package-artifact-coordinates.mjs --package mcp >> "$GITHUB_OUTPUT"

      - name: Resolve the reviewed Vue coordinates
        id: vue
        run: node scripts/print-package-artifact-coordinates.mjs --package vue >> "$GITHUB_OUTPUT"

      - name: Resolve the reviewed Nuxt coordinates
        id: nuxt
        run: node scripts/print-package-artifact-coordinates.mjs --package nuxt >> "$GITHUB_OUTPUT"

      - name: Download the exact Vue/Nuxt candidate set
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.candidate_set.outputs.artifact_name }}
          path: ${{ steps.candidate_set.outputs.directory }}

      - name: Download the exact MCP candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.mcp.outputs.artifact_name }}
          path: ${{ steps.mcp.outputs.directory }}

      - name: Verify source integrity and the exact Vue/Nuxt candidate set
        run: pnpm release:verify:set "${{ steps.candidate_set.outputs.evidence }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Certify the exact Vue candidate
        run: >-
          pnpm release:verify
          --package vue
          --artifact-manifest "${{ steps.vue.outputs.evidence }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Certify the exact Nuxt candidate
        run: >-
          pnpm release:verify
          --package nuxt
          --artifact-manifest "${{ steps.nuxt.outputs.evidence }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify source integrity and the exact MCP candidate
        run: >-
          pnpm release:verify
          --package mcp
          --artifact-manifest "${{ steps.mcp.outputs.evidence }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

  bcn-auth-staging:
    needs: verify-candidates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: bcn-auth-staging
    concurrency:
      group: bcn-auth-staging
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          package-manager-cache: false

      - name: Install pinned cloud-gate tooling
        run: npm install --global npm@"$RELEASE_NPM_VERSION" corepack@0.34.5 && corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium

      - name: Resolve the reviewed candidate coordinates
        id: candidate_set
        run: node scripts/print-candidate-set-coordinates.mjs >> "$GITHUB_OUTPUT"

      - name: Resolve the reviewed Nuxt artifact coordinates
        id: nuxt
        run: node scripts/print-package-artifact-coordinates.mjs --package nuxt >> "$GITHUB_OUTPUT"

      - name: Download the exact verified Vue/Nuxt candidate set
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.candidate_set.outputs.artifact_name }}
          path: ${{ steps.candidate_set.outputs.directory }}

      - name: Install and deploy the exact candidate, then run protected cloud-staging races
        env:
          BCN_AUTH_STAGING_CONVEX_SITE_URL: ${{ vars.BCN_AUTH_STAGING_CONVEX_SITE_URL }}
          BCN_AUTH_STAGING_CONVEX_URL: ${{ vars.BCN_AUTH_STAGING_CONVEX_URL }}
          BCN_AUTH_STAGING_EMAIL: ${{ secrets.BCN_AUTH_STAGING_EMAIL }}
          BCN_AUTH_STAGING_INGRESS_LEASE: ${{ secrets.BCN_AUTH_STAGING_INGRESS_LEASE }}
          BCN_AUTH_STAGING_ORIGIN: ${{ vars.BCN_AUTH_STAGING_ORIGIN }}
          BCN_AUTH_STAGING_PASSWORD: ${{ secrets.BCN_AUTH_STAGING_PASSWORD }}
          BCN_AUTH_STAGING_TEAM: ${{ vars.BCN_AUTH_STAGING_TEAM }}
          CONVEX_DEPLOY_KEY: ${{ secrets.BCN_AUTH_STAGING_CONVEX_DEPLOY_KEY }}
        run: >-
          pnpm test:auth-cloud-staging
          --artifact-manifest "${{ steps.nuxt.outputs.evidence }}"

      - name: Upload the separate non-secret cloud report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bcn-auth-staging-report
          path: .release-artifacts/bcn-auth-staging.report.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 90

  publish-vue-staging:
    needs: [verify-candidates, bcn-auth-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@"$RELEASE_NPM_VERSION" corepack@0.34.5 && corepack enable
      - run: pnpm install --frozen-lockfile
      - id: candidate_set
        run: node scripts/print-candidate-set-coordinates.mjs >> "$GITHUB_OUTPUT"
      - id: vue
        run: node scripts/print-package-artifact-coordinates.mjs --package vue >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.candidate_set.outputs.artifact_name }}
          path: ${{ steps.candidate_set.outputs.directory }}
      - name: Reverify the unchanged candidate set before first publication
        run: pnpm release:verify:set "${{ steps.candidate_set.outputs.evidence }}"
      - name: Publish exact Vue bytes under the non-default staging tag
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: >-
          npm publish "${{ steps.vue.outputs.tarball }}"
          --tag "$BCN_STAGING_DIST_TAG"
          --access public
      - name: Compare Vue registry bytes with the approved candidate
        run: node scripts/compare-registry-package.mjs --package vue

  registry-vue-nuxt-gate:
    needs: publish-vue-staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          package-manager-cache: false
      - run: npm install --global npm@"$RELEASE_NPM_VERSION" corepack@0.34.5 && corepack enable
      - run: pnpm install --frozen-lockfile
      - id: candidate_set
        run: node scripts/print-candidate-set-coordinates.mjs >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.candidate_set.outputs.artifact_name }}
          path: ${{ steps.candidate_set.outputs.directory }}
      - name: Install unchanged Nuxt with registry Vue and compare both installed packages
        run: >-
          node scripts/check-nuxt-registry-vue-consumer.mjs
          --artifact-set "${{ steps.candidate_set.outputs.evidence }}"

  publish-nuxt-staging:
    needs: registry-vue-nuxt-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@"$RELEASE_NPM_VERSION" corepack@0.34.5 && corepack enable
      - run: pnpm install --frozen-lockfile
      - id: candidate_set
        run: node scripts/print-candidate-set-coordinates.mjs >> "$GITHUB_OUTPUT"
      - id: nuxt
        run: node scripts/print-package-artifact-coordinates.mjs --package nuxt >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.candidate_set.outputs.artifact_name }}
          path: ${{ steps.candidate_set.outputs.directory }}
      - name: Reverify Nuxt bytes after the registry Vue gate
        run: node scripts/release.mjs verify "${{ steps.nuxt.outputs.evidence }}" --package nuxt
      - name: Publish exact Nuxt bytes under the non-default staging tag
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: >-
          npm publish "${{ steps.nuxt.outputs.tarball }}"
          --tag "$BCN_STAGING_DIST_TAG"
          --access public
      - name: Compare Nuxt registry bytes with the approved candidate
        run: node scripts/compare-registry-package.mjs --package nuxt

  publish-mcp-staging:
    needs: publish-nuxt-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@"$RELEASE_NPM_VERSION" corepack@0.34.5 && corepack enable
      - run: pnpm install --frozen-lockfile
      - id: mcp
        run: node scripts/print-package-artifact-coordinates.mjs --package mcp >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.mcp.outputs.artifact_name }}
          path: ${{ steps.mcp.outputs.directory }}
      - name: Reverify MCP bytes before its separate publication lane
        run: node scripts/release.mjs verify "${{ steps.mcp.outputs.evidence }}" --package mcp
      - name: Publish exact MCP bytes under the non-default staging tag
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: >-
          npm publish "${{ steps.mcp.outputs.tarball }}"
          --tag "$BCN_STAGING_DIST_TAG"
          --access public
      - name: Compare MCP registry bytes with the approved candidate
        run: node scripts/compare-registry-package.mjs --package mcp

  staged-candidate-set-complete:
    needs: [publish-vue-staging, registry-vue-nuxt-gate, publish-nuxt-staging, publish-mcp-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Record the safe promotion boundary
        run: >-
          echo "All registry bytes match under ${BCN_STAGING_DIST_TAG}.
          Shared user-facing dist-tags require a separate interactive maintainer action
          after reviewing the complete set; trusted-publishing OIDC cannot mutate dist-tags."

name: starters

# The demo and five downloadable starters are verified from clean temporary
# copies against one freshly built and packed candidate. Repository-relative
# links cannot satisfy this gate because the copies have no parent checkout.
on:
  pull_request:
    branches:
      - main
    paths:
      - '*'
      - 'demo/**'
      - 'scripts/**'
      - 'src/**'
      - 'starters/**'
      - '.github/workflows/starters.yml'
  push:
    branches:
      - main
    paths:
      - '*'
      - 'demo/**'
      - 'scripts/**'
      - 'src/**'
      - 'starters/**'
      - '.github/workflows/starters.yml'
  schedule:
    # Nightly full-matrix run regardless of changed paths (tier 4) — path
    # filters above only apply to push/pull_request, never to schedule.
    - cron: '17 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  candidate-apps:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install package dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify candidate in clean app copies (untrusted ref)
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
        run: pnpm run check:candidate-apps

      - name: Verify candidate in clean app copies (trusted event)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: pnpm run check:candidate-apps
        env:
          # Scheduled/release-candidate runs perform a live generated-file
          # freshness check when this repository secret is configured. This
          # step never runs pull-request-controlled code with the credential.
          AGENCY_CONVEX_DEPLOY_KEY: ${{ secrets.AGENCY_CONVEX_DEPLOY_KEY }}

  generated-artifact-allowlist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Starter generated-artifact allowlist check
        # Pure node:fs scan over starters/** — no install required (internal
        # §15.4). Also covered by the always-on root `lint` job; run again
        # here so this workflow is a complete, self-contained starters gate.
        run: node scripts/check-no-starter-generated-artifacts.mjs
